<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ระบบจัดการตัวแทนและคีย์</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 16px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 1.6rem; margin: 0 0 8px 0; text-align: center; }
        h2 { font-size: 1.3rem; margin: 0 0 16px 0; border-left: 4px solid #0f3460; padding-left: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        button { background: #0f3460; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 15px; min-height: 48px; }
        button:active { opacity: 0.7; transform: scale(0.97); }
        .btn-outline { background: #e9ecef; color: #1e2a3a; border: 1px solid #ccc; }
        .btn-danger { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #1e2a3a; }
        .btn-success { background: #10b981; }
        .btn-sync { background: #8b5cf6; }
        input { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 16px; font-size: 16px; margin-top: 5px; }
        label { font-weight: 600; display: block; margin-top: 16px; margin-bottom: 4px; }
        .key-item, .agent-item { background: #f8f9fa; border-radius: 16px; padding: 14px; margin-bottom: 12px; border: 1px solid #e9ecef; }
        .alert { background: #d4edda; padding: 14px; border-radius: 16px; margin-bottom: 16px; border-left: 4px solid #28a745; }
        .alert-error { background: #f8d7da; border-left-color: #dc2626; }
        .alert-warning { background: #fff3cd; border-left-color: #f59e0b; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #10b981; color: white; padding: 14px; border-radius: 40px; text-align: center; z-index: 1000; font-weight: 500; animation: fadeOut 2s ease-in-out; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        hr { margin: 20px 0; }
        code { background: #e9ecef; padding: 4px 12px; border-radius: 12px; font-size: 16px; font-weight: bold; }
        .password-card { background: #e9ecef; padding: 12px; border-radius: 16px; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .password-value { font-family: monospace; font-size: 24px; font-weight: bold; letter-spacing: 3px; background: white; padding: 8px 20px; border-radius: 40px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .button-group button { flex: 1; margin-top: 0; }
        .login-box { text-align: center; padding: 20px 0; }
        .login-box input { text-align: center; font-size: 24px; letter-spacing: 4px; max-width: 250px; margin: 0 auto; }
        .refresh-bar { background: #e9ecef; padding: 12px; border-radius: 40px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .logout-btn { background: #6c757d; padding: 8px 16px; font-size: 14px; }
        .sync-box { background: #ede9fe; border: 2px dashed #8b5cf6; border-radius: 16px; padding: 12px; margin-top: 16px; }
        textarea { width: 100%; padding: 10px; border-radius: 12px; font-family: monospace; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const ADMIN_PASSWORD = "RIKI999";
    
    let agents = [];
    let keys = [];
    let currentUser = null;
    
    function showToast(msg, isErr = false) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.backgroundColor = isErr ? '#dc2626' : '#10b981';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function saveData() {
        localStorage.setItem('agents', JSON.stringify(agents));
        localStorage.setItem('keys', JSON.stringify(keys));
        console.log("Saved:", { agents, keys });
    }
    
    function loadData() {
        let a = localStorage.getItem('agents');
        let k = localStorage.getItem('keys');
        if (a && k) {
            agents = JSON.parse(a);
            keys = JSON.parse(k);
        }
        if (!agents.length) {
            agents = [
                { id: "สมชาย", password: "1111" },
                { id: "อ้อม", password: "2222" },
                { id: "ฝ่ายขาย A", password: "3333" }
            ];
            keys = [
                { key: "CRX-9723E7-17DD78", agentId: "สมชาย" },
                { key: "CRX-EC7B9F-EC39F8", agentId: "สมชาย" },
                { key: "CRX-EB516D-EA448E", agentId: "อ้อม" },
                { key: "CRX-8FCBBA-9B2662", agentId: "อ้อม" }
            ];
            saveData();
        }
    }
    
    // ========== SYNC FUNCTION (สำคัญ!!) ==========
    function exportData() {
        let data = {
            agents: agents,
            keys: keys,
            version: Date.now()
        };
        let json = JSON.stringify(data);
        // สร้างลิงก์สั้นๆ ด้วย URL encoding
        let encoded = encodeURIComponent(json);
        let syncUrl = `${window.location.origin}${window.location.pathname}?sync=${encoded}`;
        
        // แสดง popup ให้คัดลอก
        prompt("📋 คัดลอกลิงก์นี้ไปส่งให้อีกเครื่อง (หรือตัวแทน):\n(ให้อีกเครื่องเปิดลิงก์นี้ จะโหลดข้อมูลเหมือนเครื่องคุณทันที)", syncUrl);
        showToast("✅ สร้างลิงก์ซิงค์แล้ว");
    }
    
    function importFromSync() {
        let urlParams = new URLSearchParams(window.location.search);
        let syncData = urlParams.get('sync');
        if (syncData) {
            try {
                let decoded = decodeURIComponent(syncData);
                let data = JSON.parse(decoded);
                if (data.agents && data.keys) {
                    agents = data.agents;
                    keys = data.keys;
                    saveData();
                    showToast("✅ ซิงค์ข้อมูลสำเร็จ! ข้อมูลตรงกับเครื่องหลักแล้ว");
                    // ล้าง URL parameter
                    window.history.replaceState({}, '', window.location.pathname);
                    renderApp();
                    return true;
                }
            } catch(e) {
                console.error("Sync error:", e);
                showToast("❌ ลิงก์ซิงค์ไม่ถูกต้อง", true);
            }
        }
        return false;
    }
    
    function logout() {
        currentUser = null;
        renderApp();
        showToast("👋 ออกจากระบบแล้ว");
    }
    
    // Admin Functions
    function addAgent() {
        let name = prompt("ชื่อตัวแทน (เช่น สมชาย):");
        if (!name) return;
        let pwd = prompt("รหัสผ่านสำหรับตัวแทนคนนี้ (ตัวแทนใช้รหัสนี้เข้าสู่ระบบ):");
        if (!pwd) return;
        if (agents.find(a => a.id === name)) {
            showToast("ชื่อตัวแทนซ้ำ", true);
            return;
        }
        agents.push({ id: name, password: pwd });
        saveData();
        renderApp();
        showToast(`✅ เพิ่ม ${name} รหัสผ่าน: ${pwd}`);
    }
    
    function deleteAgent(id) {
        if (confirm(`ลบ ${id} และคีย์ทั้งหมด?`)) {
            agents = agents.filter(a => a.id !== id);
            keys = keys.filter(k => k.agentId !== id);
            saveData();
            renderApp();
        }
    }
    
    function addKey() {
        if (!agents.length) { showToast("ไม่มีตัวแทน", true); return; }
        let list = agents.map((a,i)=> `${i+1}. ${a.id}`).join("\n");
        let name = prompt(`เลือกตัวแทน:\n${list}`);
        if (!name) return;
        let agent = agents.find(a => a.id === name);
        if (!agent) { showToast("ไม่พบ", true); return; }
        let key = prompt("รหัสคีย์ (เช่น CRX-xxxxxx):");
        if (!key) return;
        if (keys.find(k => k.key === key)) { showToast("คีย์ซ้ำ", true); return; }
        keys.push({ key: key, agentId: agent.id });
        saveData();
        renderApp();
        showToast(`✅ เพิ่มคีย์ ${key} ให้ ${agent.id}`);
    }
    
    function deleteKey(key, agentId) {
        if (confirm(`ลบคีย์ ${key}?`)) {
            keys = keys.filter(k => !(k.key === key && k.agentId === agentId));
            saveData();
            renderApp();
        }
    }
    
    function changePassword(agentId) {
        let newPwd = prompt(`รหัสผ่านใหม่สำหรับ ${agentId}:`);
        if (!newPwd) return;
        let agent = agents.find(a => a.id === agentId);
        if (agent) {
            agent.password = newPwd;
            saveData();
            renderApp();
            showToast(`✅ เปลี่ยนรหัส ${agentId} เป็น ${newPwd}`);
        }
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        showToast("✅ คัดลอกแล้ว");
    }
    
    // Agent Functions
    function deleteMyKey(key) {
        if (confirm(`ลบคีย์ ${key}?`)) {
            keys = keys.filter(k => !(k.key === key && k.agentId === currentUser.id));
            saveData();
            renderApp();
        }
    }
    
    // Login
    function handleLogin(pwd) {
        if (pwd === ADMIN_PASSWORD) {
            currentUser = { role: "admin" };
            renderApp();
            showToast("✅ เข้าสู่ระบบ Admin");
            return;
        }
        let agent = agents.find(a => a.password === pwd);
        if (agent) {
            currentUser = { role: "agent", id: agent.id };
            renderApp();
            showToast(`✅ สวัสดี ${agent.id}`);
            return;
        }
        showToast("❌ รหัสผ่านไม่ถูกต้อง", true);
    }
    
    // UI
    function renderLogin() {
        return `
            <div class="card">
                <h1>🔐 ระบบจัดการคีย์ตัวแทน</h1>
                <div class="login-box">
                    <label>🔑 กรอกรหัสผ่าน</label>
                    <input type="password" id="loginPwd" placeholder="รหัสผ่าน" autocomplete="off">
                    <button id="loginBtn" class="btn-success" style="margin-top: 20px;">เข้าสู่ระบบ</button>
                </div>
                <div class="alert-warning" style="padding: 12px; border-radius: 16px; margin-top: 16px;">
                    💡 <strong>Admin:</strong> ใช้รหัส <code>RIKI999</code><br>
                    💡 <strong>ตัวแทน:</strong> ใช้รหัสที่ Admin แจ้งให้
                </div>
            </div>
        `;
    }
    
    function renderAdmin() {
        return `
            <div class="card">
                <div class="flex-between">
                    <h1>👑 แผงควบคุม Admin</h1>
                    <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
                </div>
                <div class="button-group">
                    <button class="btn-success" onclick="addAgent()">➕ เพิ่มตัวแทน</button>
                    <button class="btn-success" onclick="addKey()">🔑 เพิ่มคีย์</button>
                    <button class="btn-sync" onclick="exportData()">🔄 สร้างลิงก์ซิงค์ข้อมูล</button>
                </div>
                <div class="sync-box">
                    <strong>🔄 วิธีซิงค์ข้อมูลไปยังเครื่องอื่น/ตัวแทน:</strong><br>
                    1. กดปุ่ม <strong>"สร้างลิงก์ซิงค์ข้อมูล"</strong> ด้านบน<br>
                    2. คัดลอกลิงก์ที่ได้ ไปส่งให้อีกเครื่อง (หรือตัวแทน)<br>
                    3. อีกเครื่องเปิดลิงก์นั้น → ข้อมูลจะตรงกับเครื่องคุณทันที
                </div>
                <div class="alert-warning" style="margin-top: 16px;">
                    💡 เวลาส่งรหัสให้ตัวแทน ให้คัดลอกไปวางเลย อย่าพิมพ์เอง
                </div>
            </div>
            <div class="card">
                <h2>📋 รายชื่อตัวแทน</h2>
                ${agents.map(ag => {
                    let myKeys = keys.filter(k => k.agentId === ag.id);
                    return `
                        <div class="agent-item">
                            <div class="flex-between">
                                <strong>👤 ${ag.id}</strong>
                                <div class="button-group" style="width: auto;">
                                    <button class="btn-outline" onclick="changePassword('${ag.id}')">🔑 เปลี่ยนรหัส</button>
                                    <button class="btn-danger" onclick="deleteAgent('${ag.id}')">🗑️ ลบ</button>
                                </div>
                            </div>
                            <div class="password-card">
                                <span>🔐 รหัสผ่าน:</span>
                                <code class="password-value">${ag.password}</code>
                                <button class="btn-outline" onclick="copyToClipboard('${ag.password}')">📋 คัดลอกรหัส</button>
                            </div>
                            <div style="margin-top: 12px;">
                                <strong>🔑 คีย์ (${myKeys.length}):</strong>
                                ${myKeys.length ? myKeys.map(k => `
                                    <div class="flex-between" style="background:white; padding:8px 12px; border-radius:12px; margin-top:8px;">
                                        <code>${k.key}</code>
                                        <button class="btn-danger" onclick="deleteKey('${k.key}', '${ag.id}')">ลบ</button>
                                    </div>
                                `).join('') : '<p style="color:#666;">ยังไม่มีคีย์</p>'}
                            </div>
                        </div>
                    `;
                }).join('')}
                ${!agents.length ? '<p>ยังไม่มีตัวแทน</p>' : ''}
            </div>
        `;
    }
    
    function renderAgent() {
        let agent = agents.find(a => a.id === currentUser.id);
        if (!agent) { logout(); return '<div></div>'; }
        let myKeys = keys.filter(k => k.agentId === currentUser.id);
        let now = new Date().toLocaleTimeString();
        return `
            <div class="card">
                <div class="flex-between">
                    <h1>🔗 หน้าตัวแทน</h1>
                    <button class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</button>
                </div>
                <div class="alert">✅ สวัสดีคุณ <strong>${agent.id}</strong></div>
                <div class="refresh-bar">
                    <span>🕐 อัปเดตล่าสุด: ${now}</span>
                    <button onclick="renderApp()" style="padding: 8px 16px;">🔄 รีเฟรช</button>
                </div>
                ${myKeys.length === 0 ? '<div class="alert-warning">⚠️ คุณยังไม่มีคีย์</div>' : `
                    <h2>📋 คีย์ของคุณ (${myKeys.length})</h2>
                    ${myKeys.map(k => `
                        <div class="key-item">
                            <div><strong>🔑 ${k.key}</strong></div>
                            <div class="link-box">${window.location.origin}${window.location.pathname}?key=${encodeURIComponent(k.key)}</div>
                            <div class="button-group">
                                <button class="btn-outline" onclick='copyToClipboard("${window.location.origin}${window.location.pathname}?key=${encodeURIComponent(k.key)}")'>📋 คัดลอก</button>
                                <button class="btn-danger" onclick='deleteMyKey("${k.key}")'>🗑️ ลบ</button>
                            </div>
                        </div>
                    `).join('')}
                `}
                <div class="sync-box" style="margin-top: 16px;">
                    <strong>🔄 ถ้าข้อมูลไม่ตรงกับที่ Admin แจ้ง:</strong><br>
                    ให้ขอ "ลิงก์ซิงค์" จาก Admin แล้วเปิดลิงก์นั้น<br>
                    (ข้อมูลจะอัปเดตตรงกับเครื่อง Admin ทันที)
                </div>
            </div>
        `;
    }
    
    function renderApp() {
        let app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderLogin();
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                let pwd = document.getElementById('loginPwd').value;
                handleLogin(pwd);
            });
            document.getElementById('loginPwd')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin(e.target.value);
            });
            return;
        }
        if (currentUser.role === 'admin') app.innerHTML = renderAdmin();
        else app.innerHTML = renderAgent();
    }
    
    // ทำให้ฟังก์ชันใช้ได้ใน onclick
    window.addAgent = addAgent;
    window.addKey = addKey;
    window.deleteAgent = deleteAgent;
    window.deleteKey = deleteKey;
    window.deleteMyKey = deleteMyKey;
    window.changePassword = changePassword;
    window.copyToClipboard = copyToClipboard;
    window.logout = logout;
    window.renderApp = renderApp;
    window.exportData = exportData;
    
    // ตรวจสอบการซิงค์จาก URL ก่อน
    loadData();
    if (!importFromSync()) {
        renderApp();
    }
</script>
</body>
</html>
