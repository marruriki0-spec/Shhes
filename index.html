<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="description" content="เครื่องมือสร้างลิงก์จากคีย์ระดับองค์กร">
  <meta name="theme-color" content="#1a0e2e">
  <title>สร้างลิงก์จากคีย์ Pro | รุ่นองค์กร</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <style>
    :root {
      --bg-primary: #0a0618;
      --bg-secondary: #1a0e2e;
      --bg-glass: rgba(20, 12, 40, 0.45);
      --text-primary: #e0d9f5;
      --text-secondary: #b7a4dd;
      --accent-primary: #b57aff;
      --accent-secondary: #c084fc;
      --accent-glow: #a855f7;
      --border-glass: rgba(180, 130, 255, 0.25);
      --card-bg: rgba(22, 12, 42, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 20%, var(--bg-secondary), var(--bg-primary));
      min-height: 100vh;
      padding: 1rem;
      color: var(--text-primary);
    }

    .app-container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 24px rgba(168,85,247,0.4);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo-icon {
      font-size: 2rem;
      color: var(--accent-secondary);
      filter: drop-shadow(0 0 10px var(--accent-glow));
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-secondary), #e0b0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .badge {
      padding: 0.2rem 0.6rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(16,185,129,0.3);
      color: #6bff8e;
    }

    .btn {
      padding: 0.6rem 1.3rem;
      border-radius: 2.5rem;
      border: 1px solid var(--border-glass);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(168,85,247,0.4);
      border-color: var(--accent-secondary);
    }

    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      border-color: #a78bfa;
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: #f87171;
      color: white;
    }

    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }
    .btn-xs { padding: 0.3rem 0.7rem; font-size: 0.75rem; }

    .main-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .main-content { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: 1.5rem;
      padding: 1.2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .panel-title {
      font-weight: 700;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    textarea {
      width: 100%;
      min-height: 200px;
      background: rgba(10, 5, 22, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 1.2rem;
      padding: 1rem;
      font-size: 0.9rem;
      color: var(--text-primary);
      font-family: 'Courier New', monospace;
      outline: none;
      resize: vertical;
      transition: all 0.3s;
    }

    textarea:focus {
      border-color: var(--accent-secondary);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .link-list-container {
      max-height: 400px;
      overflow-y: auto;
      border-radius: 1rem;
      background: rgba(8, 4, 20, 0.4);
      border: 1px solid var(--border-glass);
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: all 0.2s;
      flex-wrap: wrap;
    }

    .link-item:hover {
      background: rgba(120, 70, 210, 0.15);
    }

    .link-item .checkbox {
      accent-color: var(--accent-primary);
      width: 1.1rem;
      height: 1.1rem;
      cursor: pointer;
    }

    .link-item .link-text {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      word-break: break-all;
      min-width: 0;
    }

    .item-actions {
      display: flex;
      gap: 0.3rem;
    }

    .search-input {
      width: 100%;
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      border: 1px solid var(--border-glass);
      background: rgba(10,5,22,0.5);
      color: var(--text-primary);
      outline: none;
      backdrop-filter: blur(8px);
      transition: 0.3s;
    }

    .search-input:focus {
      border-color: var(--accent-secondary);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }

    .divider {
      width: 1px;
      height: 24px;
      background: var(--border-glass);
      margin: 0 0.3rem;
    }

    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
    }

    .toast {
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-glass);
      border-radius: 2.5rem;
      padding: 0.8rem 1.5rem;
      font-weight: 500;
      box-shadow: 0 0 24px rgba(168,85,247,0.4);
      animation: slideIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(80px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .drop-zone {
      border: 2px dashed var(--border-glass);
      border-radius: 1.5rem;
      padding: 1.5rem;
      text-align: center;
      transition: all 0.3s;
      cursor: pointer;
    }

    .drop-zone.drag-over {
      border-color: var(--accent-secondary);
      background: rgba(168,85,247,0.1);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      background: var(--bg-glass);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-glass);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 90vw;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.7), 0 0 24px rgba(168,85,247,0.4);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 3px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .stat-card {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-glass);
      border-radius: 1.5rem;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .stat-icon {
      font-size: 2rem;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 1rem;
      background: var(--card-bg);
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.2rem;
    }

    .baseurl-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      border-radius: 2rem;
      padding: 0.6rem 1.2rem;
    }

    .baseurl-input {
      flex: 1;
      background: rgba(10,5,22,0.6);
      border: 1px solid var(--border-glass);
      border-radius: 2rem;
      padding: 0.5rem 1rem;
      color: var(--text-primary);
      font-family: monospace;
      outline: none;
      min-width: 200px;
    }

    .baseurl-input:focus {
      border-color: var(--accent-secondary);
      box-shadow: 0 0 12px var(--accent-glow);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- ส่วนหัว -->
    <header class="header">
      <div class="header-left">
        <i class="fas fa-bolt logo-icon"></i>
        <span class="header-title">สร้างลิงก์จากคีย์ Pro</span>
        <span class="badge">v3.0 องค์กร</span>
      </div>
      <div class="toolbar">
        <button class="btn btn-sm" onclick="undoAction()"><i class="fas fa-undo"></i> เลิกทำ</button>
        <button class="btn btn-sm" id="backupBtn"><i class="fas fa-cloud-upload-alt"></i> สำรองข้อมูล</button>
        <button class="btn btn-sm" id="restoreBtn"><i class="fas fa-cloud-download-alt"></i> กู้คืน</button>
      </div>
    </header>

    <!-- ตัวแก้ไข Base URL -->
    <div class="baseurl-section">
      <label style="font-weight:600;white-space:nowrap;"><i class="fas fa-globe"></i> Base URL:</label>
      <input type="text" id="baseUrlInput" class="baseurl-input" value="https://marruriki0-spec.github.io/Shhes/">
      <button class="btn btn-sm btn-primary" id="saveBaseUrlBtn"><i class="fas fa-save"></i> บันทึก</button>
    </div>

    <!-- สถิติ -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#667eea,#764ba2);">🔑</div>
        <div>
          <div class="stat-value" id="totalKeysStat">0</div>
          <div class="stat-label">คีย์ทั้งหมด</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#f093fb,#f5576c);">🔄</div>
        <div>
          <div class="stat-value" id="duplicateKeysStat">0</div>
          <div class="stat-label">คีย์ซ้ำ</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:linear-gradient(135deg,#4facfe,#00f2fe);">🔗</div>
        <div>
          <div class="stat-value" id="totalLinksStat">0</div>
          <div class="stat-label">ลิงก์ที่สร้าง</div>
        </div>
      </div>
    </div>

    <!-- เนื้อหาหลัก -->
    <div class="main-content">
      <!-- แผงซ้าย -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-keyboard"></i> ป้อนคีย์</span>
          <div class="toolbar">
            <button class="btn btn-sm" id="importTxtBtn"><i class="fas fa-file-import"></i> TXT</button>
            <button class="btn btn-sm" id="importCsvBtn"><i class="fas fa-file-csv"></i> CSV</button>
            <button class="btn btn-sm" id="pasteBtn"><i class="fas fa-paste"></i> วาง</button>
            <button class="btn btn-sm btn-danger" id="clearInputBtn"><i class="fas fa-eraser"></i> ล้าง</button>
          </div>
        </div>
        <div class="drop-zone" id="dropZone">
          <i class="fas fa-cloud-upload-alt" style="font-size:2rem;opacity:0.5;"></i>
          <p style="opacity:0.7;margin-top:0.5rem;">ลากและวางไฟล์ .txt / .csv ที่นี่</p>
        </div>
        <textarea id="keyInput" placeholder="วางคีย์ของคุณที่นี่...&#10;หนึ่งคีย์ต่อบรรทัด&#10;ตัวอย่าง: CRX-A0D671-CEBEAA"></textarea>
        <button class="btn btn-primary" id="generateBtn"><i class="fas fa-wand-magic-sparkles"></i> สร้างลิงก์</button>
      </div>

      <!-- แผงขวา -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-link"></i> ลิงก์ที่สร้าง</span>
          <div class="toolbar">
            <button class="btn btn-sm" id="selectAllBtn"><i class="far fa-check-square"></i> เลือกทั้งหมด</button>
            <button class="btn btn-sm" id="deselectAllBtn"><i class="far fa-square"></i> ยกเลิก</button>
            <div class="divider"></div>
            <button class="btn btn-sm" id="copyAllBtn"><i class="fas fa-copy"></i> คัดลอกทั้งหมด</button>
            <button class="btn btn-sm" id="copySelectedBtn"><i class="fas fa-check-double"></i> คัดลอกที่เลือก</button>
            <div class="divider"></div>
            <button class="btn btn-sm btn-danger" id="deleteSelectedBtn"><i class="fas fa-trash"></i> ลบที่เลือก</button>
          </div>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 ค้นหาลิงก์...">
        <div class="link-list-container" id="linkListContainer">
          <div style="text-align:center;padding:2rem;opacity:0.5;">
            <i class="fas fa-inbox" style="font-size:3rem;"></i>
            <p>ยังไม่มีลิงก์ที่สร้าง</p>
          </div>
        </div>
        <div class="toolbar" style="justify-content:space-between;">
          <span id="paginationInfo" style="font-size:0.85rem;opacity:0.7;">หน้า 1 จาก 1</span>
          <div style="display:flex;gap:0.3rem;">
            <button class="btn btn-sm" id="prevPageBtn"><i class="fas fa-chevron-left"></i> ก่อนหน้า</button>
            <button class="btn btn-sm" id="nextPageBtn">ถัดไป <i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".txt,.csv" style="display:none;">
  <div class="toast-container" id="toastContainer"></div>

  <script>
    (function() {
      'use strict';

      // ⚡ เปลี่ยน Base URL ตรงนี้ได้เลย
      let BASE_URL = 'https://marruriki0-spec.github.io/Shhes/';
      
      const STORAGE_KEY = 'keygen_pro_data';
      const MAX_VISIBLE = 50;

      // DOM elements
      const $ = (s) => document.querySelector(s);
      const keyInput = $('#keyInput');
      const baseUrlInput = $('#baseUrlInput');
      const linkListContainer = $('#linkListContainer');
      const searchInput = $('#searchInput');
      const toastContainer = $('#toastContainer');
      const fileInput = $('#fileInput');
      const dropZone = $('#dropZone');
      const paginationInfo = $('#paginationInfo');
      const totalKeysStat = $('#totalKeysStat');
      const duplicateKeysStat = $('#duplicateKeysStat');
      const totalLinksStat = $('#totalLinksStat');

      // State
      let keys = [];
      let links = [];
      let duplicates = [];
      let filteredLinks = [];
      let currentPage = 1;
      const selectedLinks = new Set();
      let history = [];
      let historyIndex = -1;

      // ==================== BASE URL ====================
      function getBaseUrl() {
        let url = baseUrlInput.value.trim();
        // ถ้าไม่ลงท้ายด้วย / หรือ ?key= ให้เติมให้
        if (url && !url.endsWith('/') && !url.includes('?key=')) {
          url += '/';
        }
        return url || BASE_URL;
      }

      function saveBaseUrl() {
        const url = getBaseUrl();
        localStorage.setItem('keygen_baseurl', url);
        BASE_URL = url;
        showToast('บันทึก Base URL แล้ว!', 'success');
        // สร้างลิงก์ใหม่ทันทีถ้ามีคีย์
        if (keys.length > 0) {
          links = buildLinks(keys);
          renderLinks();
          saveToStorage();
        }
      }

      // ==================== TOAST ====================
      function showToast(msg, type = 'info') {
        const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = `${icons[type] || icons.info} ${msg}`;
        toastContainer.appendChild(toast);
        setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.3s';
          setTimeout(() => toast.remove(), 300);
        }, 2500);
      }

      // ==================== COPY ====================
      function copyText(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.left = '0';
        textarea.style.top = '0';
        textarea.style.width = '2em';
        textarea.style.height = '2em';
        textarea.style.opacity = '0';
        
        document.body.appendChild(textarea);
        
        if (navigator.userAgent.match(/ipad|ipod|iphone/i)) {
          textarea.contentEditable = true;
          textarea.readOnly = false;
          const range = document.createRange();
          range.selectNodeContents(textarea);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);
          textarea.setSelectionRange(0, 999999);
        } else {
          textarea.focus();
          textarea.select();
          textarea.setSelectionRange(0, 999999);
        }
        
        let success = false;
        try {
          success = document.execCommand('copy');
        } catch (err) {
          console.error('Copy error:', err);
        }
        
        document.body.removeChild(textarea);
        window.getSelection()?.removeAllRanges();
        
        return success;
      }

      // ==================== HISTORY ====================
      function saveHistory() {
        const snapshot = { keys: [...keys], links: [...links], duplicates: [...duplicates] };
        history = history.slice(0, historyIndex + 1);
        history.push(snapshot);
        if (history.length > 50) history.shift();
        historyIndex = history.length - 1;
      }

      window.undoAction = function() {
        if (historyIndex > 0) {
          historyIndex--;
          restoreSnapshot(history[historyIndex]);
          showToast('เลิกทำสำเร็จ', 'info');
        }
      };

      function restoreSnapshot(snapshot) {
        keys = [...snapshot.keys];
        links = [...snapshot.links];
        duplicates = [...snapshot.duplicates];
        keyInput.value = keys.join('\n');
        renderLinks();
        updateStats();
      }

      // ==================== PROCESS KEYS ====================
      function processKeys(raw) {
        if (!raw || !raw.trim()) return { keys: [], duplicates: [] };
        const lines = raw.split(/\r?\n/);
        const seen = new Set();
        const k = [], d = [];
        for (let line of lines) {
          const t = line.trim();
          if (!t) continue;
          if (seen.has(t)) { d.push(t); }
          else { seen.add(t); k.push(t); }
        }
        return { keys: k, duplicates: d };
      }

      function buildLinks(keyArr) {
        const base = getBaseUrl();
        return keyArr.map(k => base + encodeURIComponent(k));
      }

      // ==================== RENDER ====================
      function renderLinks() {
        const search = searchInput.value.toLowerCase().trim();
        let display = links;
        if (search) display = links.filter(l => l.toLowerCase().includes(search));
        filteredLinks = display;

        const totalPages = Math.ceil(display.length / MAX_VISIBLE) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * MAX_VISIBLE;
        const pageLinks = display.slice(start, start + MAX_VISIBLE);

        const frag = document.createDocumentFragment();
        linkListContainer.innerHTML = '';

        if (!pageLinks.length) {
          linkListContainer.innerHTML = `<div style="text-align:center;padding:3rem;opacity:0.5;">
            <i class="fas fa-inbox" style="font-size:3rem;"></i>
            <p>${search ? 'ไม่พบลิงก์' : 'ยังไม่มีลิงก์'}</p></div>`;
        } else {
          pageLinks.forEach(link => {
            const div = document.createElement('div');
            div.className = 'link-item';
            div.setAttribute('data-link', link);
            div.innerHTML = `
              <input type="checkbox" class="checkbox" ${selectedLinks.has(link) ? 'checked' : ''}>
              <span class="link-text" title="${link}">${link.length > 60 ? link.substring(0,60)+'...' : link}</span>
              <div class="item-actions">
                <button class="btn btn-xs copy-btn"><i class="far fa-copy"></i></button>
                <button class="btn btn-xs open-btn"><i class="fas fa-external-link-alt"></i></button>
                <button class="btn btn-xs qr-btn"><i class="fas fa-qrcode"></i></button>
                <button class="btn btn-xs btn-danger del-btn"><i class="fas fa-trash"></i></button>
              </div>`;
            frag.appendChild(div);
          });
          linkListContainer.appendChild(frag);
        }

        paginationInfo.textContent = `หน้า ${currentPage} จาก ${totalPages} (${display.length} ลิงก์)`;
        updateStats();
      }

      // Event delegation
      linkListContainer.addEventListener('click', function(e) {
        const item = e.target.closest('.link-item');
        if (!item) return;
        const link = item.getAttribute('data-link');

        if (e.target.closest('.copy-btn')) {
          const ok = copyText(link);
          showToast(ok ? 'คัดลอกแล้ว!' : 'คัดลอกไม่สำเร็จ', ok ? 'success' : 'error');
        } else if (e.target.closest('.open-btn')) {
          window.open(link, '_blank');
        } else if (e.target.closest('.qr-btn')) {
          showQR(link);
        } else if (e.target.closest('.del-btn')) {
          saveHistory();
          links = links.filter(l => l !== link);
          selectedLinks.delete(link);
          renderLinks();
          showToast('ลบลิงก์แล้ว', 'info');
        }
      });

      linkListContainer.addEventListener('change', function(e) {
        if (e.target.type === 'checkbox') {
          const link = e.target.closest('.link-item')?.getAttribute('data-link');
          if (!link) return;
          e.target.checked ? selectedLinks.add(link) : selectedLinks.delete(link);
        }
      });

      function showQR(link) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal-content" style="text-align:center;">
          <h3>รหัส QR</h3>
          <div id="qrContainer" style="display:inline-block;padding:1rem;background:white;border-radius:1rem;"></div>
          <p style="margin:1rem 0;word-break:break-all;">${link}</p>
          <button class="btn" id="closeQr">ปิด</button></div>`;
        document.body.appendChild(overlay);
        new QRCode(overlay.querySelector('#qrContainer'), { text: link, width: 200, height: 200, colorDark: "#1a0e2e", colorLight: "#ffffff" });
        overlay.querySelector('#closeQr').addEventListener('click', () => overlay.remove());
        overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
      }

      // ==================== STATS ====================
      function updateStats() {
        totalKeysStat.textContent = keys.length;
        duplicateKeysStat.textContent = duplicates.length;
        totalLinksStat.textContent = links.length;
      }

      // ==================== GENERATE ====================
      function generate() {
        const { keys: k, duplicates: d } = processKeys(keyInput.value);
        saveHistory();
        keys = k;
        duplicates = d;
        links = buildLinks(k);
        selectedLinks.clear();
        currentPage = 1;
        renderLinks();
        saveToStorage();
        showToast(`สร้าง ${links.length} ลิงก์แล้ว (ลบซ้ำ ${d.length} รายการ)`, 'success');
      }

      // ==================== STORAGE ====================
      function saveToStorage() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ 
            keys, links, duplicates, text: keyInput.value,
            baseUrl: getBaseUrl()
          }));
        } catch(e) {}
      }

      function loadStorage() {
        try {
          const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (d) {
            keys = d.keys || [];
            links = d.links || [];
            duplicates = d.duplicates || [];
            keyInput.value = d.text || keys.join('\n');
            if (d.baseUrl) {
              BASE_URL = d.baseUrl;
              baseUrlInput.value = d.baseUrl;
            }
            // โหลด Base URL ที่บันทึกแยก
            const savedUrl = localStorage.getItem('keygen_baseurl');
            if (savedUrl) {
              BASE_URL = savedUrl;
              baseUrlInput.value = savedUrl;
            }
            renderLinks();
            updateStats();
          }
        } catch(e) {}
      }

      // ==================== IMPORT ====================
      function importFile(file) {
        const reader = new FileReader();
        reader.onload = e => {
          keyInput.value = e.target.result;
          generate();
        };
        reader.readAsText(file);
      }

      // ==================== EVENT BINDINGS ====================
      $('#generateBtn').addEventListener('click', generate);

      $('#saveBaseUrlBtn').addEventListener('click', saveBaseUrl);
      
      // Auto-save เมื่อกด Enter ในช่อง Base URL
      baseUrlInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') saveBaseUrl();
      });

      $('#clearInputBtn').addEventListener('click', () => {
        saveHistory();
        keyInput.value = '';
        keys = []; links = []; duplicates = [];
        selectedLinks.clear();
        renderLinks();
        saveToStorage();
        showToast('ล้างข้อมูลแล้ว', 'info');
      });

      // COPY ALL
      $('#copyAllBtn').addEventListener('click', function() {
        if (!links.length) {
          showToast('ไม่มีลิงก์ให้คัดลอก', 'warning');
          return;
        }
        const text = links.join('\n');
        const success = copyText(text);
        showToast(success ? `คัดลอก ${links.length} ลิงก์แล้ว!` : 'คัดลอกไม่สำเร็จ กรุณาลองใหม่', success ? 'success' : 'error');
      });

      $('#copySelectedBtn').addEventListener('click', function() {
        if (!selectedLinks.size) {
          showToast('ไม่ได้เลือกลิงก์ใด', 'warning');
          return;
        }
        const arr = [...selectedLinks];
        const success = copyText(arr.join('\n'));
        showToast(success ? `คัดลอก ${arr.length} ลิงก์แล้ว!` : 'คัดลอกไม่สำเร็จ', success ? 'success' : 'error');
      });

      $('#selectAllBtn').addEventListener('click', () => {
        filteredLinks.forEach(l => selectedLinks.add(l));
        renderLinks();
      });

      $('#deselectAllBtn').addEventListener('click', () => {
        selectedLinks.clear();
        renderLinks();
      });

      $('#deleteSelectedBtn').addEventListener('click', () => {
        if (!selectedLinks.size) { showToast('ไม่ได้เลือกลิงก์', 'warning'); return; }
        saveHistory();
        const count = selectedLinks.size;
        links = links.filter(l => !selectedLinks.has(l));
        selectedLinks.clear();
        renderLinks();
        showToast(`ลบ ${count} ลิงก์แล้ว`, 'info');
      });

      $('#prevPageBtn').addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderLinks(); }
      });

      $('#nextPageBtn').addEventListener('click', () => {
        const max = Math.ceil(filteredLinks.length / MAX_VISIBLE) || 1;
        if (currentPage < max) { currentPage++; renderLinks(); }
      });

      searchInput.addEventListener('input', function() {
        currentPage = 1;
        renderLinks();
      });

      // Import
      $('#importTxtBtn').addEventListener('click', () => { fileInput.accept = '.txt'; fileInput.click(); });
      $('#importCsvBtn').addEventListener('click', () => { fileInput.accept = '.csv'; fileInput.click(); });

      $('#pasteBtn').addEventListener('click', async () => {
        try {
          const text = await navigator.clipboard.readText();
          keyInput.value = text;
          generate();
        } catch { showToast('ไม่สามารถวางจากคลิปบอร์ดได้', 'error'); }
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files[0]) importFile(e.target.files[0]);
        fileInput.value = '';
      });

      // Drag & Drop
      dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) importFile(e.dataTransfer.files[0]);
      });

      // Backup/Restore
      $('#backupBtn').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify({ keys, links, duplicates, baseUrl: getBaseUrl() }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup-${Date.now()}.json`;
        a.click();
        showToast('ดาวน์โหลดสำรองข้อมูลแล้ว', 'success');
      });

      $('#restoreBtn').addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = '.json';
        inp.onchange = (e) => {
          const f = e.target.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = (ev) => {
            try {
              const d = JSON.parse(ev.target.result);
              if (d.keys && d.links) {
                saveHistory();
                keys = d.keys;
                links = d.links;
                duplicates = d.duplicates || [];
                keyInput.value = keys.join('\n');
                if (d.baseUrl) {
                  BASE_URL = d.baseUrl;
                  baseUrlInput.value = d.baseUrl;
                  localStorage.setItem('keygen_baseurl', d.baseUrl);
                }
                renderLinks();
                updateStats();
                saveToStorage();
                showToast('กู้คืนข้อมูลสำเร็จ', 'success');
              }
            } catch { showToast('ไฟล์ไม่ถูกต้อง', 'error'); }
          };
          r.readAsText(f);
        };
        inp.click();
      });

      // Auto generate
      keyInput.addEventListener('input', function() {
        clearTimeout(this._timer);
        this._timer = setTimeout(generate, 500);
      });

      // Keyboard shortcuts
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'g') { e.preventDefault(); generate(); }
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); window.undoAction(); }
      });

      // Init
      loadStorage();
      if (!keys.length) { renderLinks(); updateStats(); }
      
      // ตั้งค่า Base URL เริ่มต้น
      const savedUrl = localStorage.getItem('keygen_baseurl');
      if (savedUrl) {
        baseUrlInput.value = savedUrl;
        BASE_URL = savedUrl;
      }
      
      console.log('🚀 พร้อมใช้งานแล้ว! Base URL:', BASE_URL);
    })();
  </script>
</body>
</html>
