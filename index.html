<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ระบบจัดการลิงก์ตัวแทน</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { font-size: 1.6rem; margin-top: 0; margin-bottom: 8px; }
        h2 { font-size: 1.3rem; margin: 0 0 16px 0; border-left: 4px solid #0f3460; padding-left: 12px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        button { background: #0f3460; color: white; border: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.9; }
        .btn-outline { background: #e9ecef; color: #1e2a3a; border: 1px solid #ccc; }
        .btn-danger { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #1e2a3a; }
        .btn-success { background: #10b981; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 16px; font-size: 14px; margin-top: 5px; }
        label { font-weight: 600; display: block; margin-top: 12px; }
        .key-item, .agent-item { background: #f8f9fa; border-radius: 16px; padding: 12px; margin-bottom: 10px; border: 1px solid #e9ecef; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .badge { background: #e9ecef; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .alert { background: #d4edda; padding: 12px; border-radius: 16px; margin-bottom: 16px; }
        .toast { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #10b981; color: white; padding: 12px; border-radius: 40px; text-align: center; z-index: 1000; animation: fadeOut 2s ease-in-out; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        hr { margin: 20px 0; }
        code { background: #e9ecef; padding: 2px 6px; border-radius: 8px; font-size: 12px; word-break: break-all; }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    const BASE_URL = window.location.origin + window.location.pathname;
    const ADMIN_SECRET = "myadmin123";
    
    let agents = [];
    let keys = [];
    let isAdminMode = false;
    
    function showToast(msg, isErr = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.backgroundColor = isErr ? '#dc2626' : '#10b981';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function saveData() {
        localStorage.setItem('agents', JSON.stringify(agents));
        localStorage.setItem('keys', JSON.stringify(keys));
        console.log("Saved", agents, keys);
    }
    
    function loadData() {
        const storedAgents = localStorage.getItem('agents');
        const storedKeys = localStorage.getItem('keys');
        
        if (storedAgents && storedKeys) {
            agents = JSON.parse(storedAgents);
            keys = JSON.parse(storedKeys);
        }
        
        // ตรวจสอบว่าถ้า agents ว่างเปล่าและ keys ว่างเปล่า -> ไม่โหลดตัวอย่างอัตโนมัติ!
        // แต่ถ้าต้องการตัวอย่าง ให้กดปุ่ม "โหลดตัวอย่าง" เอง
        if (!agents.length && !keys.length) {
            agents = [];
            keys = [];
        }
    }
    
    function loadSampleData() {
        agents = [
            { id: "สมชาย", code: "agent_somchai" },
            { id: "อ้อม", code: "agent_om" },
            { id: "ฝ่ายขาย A", code: "agent_salesteamA" }
        ];
        keys = [
            { key: "CRX-9723E7-17DD78", agentId: "สมชาย" },
            { key: "CRX-EC7B9F-EC39F8", agentId: "สมชาย" },
            { key: "CRX-EB516D-EA448E", agentId: "อ้อม" },
            { key: "CRX-8FCBBA-9B2662", agentId: "อ้อม" },
            { key: "CRX-FC39FA-9D82FA", agentId: "ฝ่ายขาย A" },
            { key: "CRX-9AFFD7-117C6B", agentId: "ฝ่ายขาย A" }
        ];
        saveData();
        renderApp();
        showToast("✅ โหลดข้อมูลตัวอย่างแล้ว");
    }
    
    function clearAllData() {
        if (confirm("⚠️ ล้างข้อมูลทั้งหมด? (ตัวแทนและคีย์ทั้งหมดจะหาย)")) {
            agents = [];
            keys = [];
            localStorage.removeItem('agents');
            localStorage.removeItem('keys');
            renderApp();
            showToast("🗑️ ล้างข้อมูลเรียบร้อย");
        }
    }
    
    function deleteAgent(agentId) {
        if (confirm(`ลบตัวแทน "${agentId}" และคีย์ทั้งหมดของคนนี้?`)) {
            agents = agents.filter(a => a.id !== agentId);
            keys = keys.filter(k => k.agentId !== agentId);
            saveData();
            renderApp();
            showToast(`ลบ ${agentId} แล้ว`);
        }
    }
    
    function deleteKeyFromAgent(keyToDelete, agentId) {
        if (confirm(`ลบคีย์ "${keyToDelete}"?`)) {
            keys = keys.filter(k => !(k.key === keyToDelete && k.agentId === agentId));
            saveData();
            renderApp();
            showToast(`ลบคีย์ ${keyToDelete} แล้ว`);
        }
    }
    
    function addAgent() {
        let name = prompt("ชื่อตัวแทน (เช่น สมชาย):");
        if (!name) return;
        let code = prompt("รหัสเฉพาะตัวแทน (ภาษาอังกฤษ เช่น agent_somchai):");
        if (!code) return;
        if (agents.find(a => a.id === name)) {
            showToast("ชื่อตัวแทนซ้ำ", true);
            return;
        }
        if (agents.find(a => a.code === code)) {
            showToast("รหัสเฉพาะซ้ำ", true);
            return;
        }
        agents.push({ id: name, code: code });
        saveData();
        renderApp();
        showToast(`เพิ่มตัวแทน ${name} แล้ว`);
    }
    
    function addKeyToAgent() {
        if (agents.length === 0) {
            showToast("ยังไม่มีตัวแทน กรุณาเพิ่มตัวแทนก่อน", true);
            return;
        }
        let agentNames = agents.map(a => a.id).join(", ");
        let agentId = prompt(`เลือกตัวแทน (${agentNames}):`);
        if (!agentId || !agents.find(a => a.id === agentId)) {
            showToast("ชื่อตัวแทนไม่ถูกต้อง", true);
            return;
        }
        let keyRaw = prompt("รหัสคีย์ (เช่น CRX-9723E7-17DD78):");
        if (!keyRaw) return;
        if (keys.find(k => k.key === keyRaw)) {
            showToast("คีย์นี้มีอยู่แล้ว", true);
            return;
        }
        keys.push({ key: keyRaw, agentId: agentId });
        saveData();
        renderApp();
        showToast(`เพิ่มคีย์ ${keyRaw} ให้ ${agentId} แล้ว`);
    }
    
    function renderAgentView(agent) {
        const agentKeys = keys.filter(k => k.agentId === agent.id);
        return `
            <div class="card">
                <h1>🔗 หน้าคัดลอกลิงก์สำหรับตัวแทน</h1>
                <div class="alert">✅ สวัสดีคุณ <strong>${escapeHtml(agent.id)}</strong></div>
                ${agentKeys.length === 0 ? '<p>⚠️ คุณยังไม่มีคีย์</p>' : agentKeys.map(k => `
                    <div class="key-item">
                        <div><strong>🔑 ${escapeHtml(k.key)}</strong></div>
                        <div class="link-box" style="background:#e9ecef; padding:8px; border-radius:12px; margin:8px 0; word-break:break-all;">${BASE_URL}?key=${encodeURIComponent(k.key)}</div>
                        <div class="flex-between">
                            <button class="btn-outline" onclick="navigator.clipboard.writeText('${BASE_URL}?key=${encodeURIComponent(k.key)}'); showToast('คัดลอกแล้ว')">📋 คัดลอก</button>
                            <button class="btn-danger" onclick="deleteKeyFromAgent('${k.key}', '${agent.id}')">🗑️ ลบ</button>
                        </div>
                    </div>
                `).join('')}
                <hr>
                <a href="#" id="goAdminBtn">🔐 เข้าสู่ระบบ Admin</a>
            </div>
        `;
    }
    
    function renderAdminView() {
        return `
            <div class="card">
                <div class="flex-between">
                    <h1>🔐 แผงควบคุม Admin</h1>
                    <div>
                        <button class="btn-warning" onclick="clearAllData()">🗑️ ล้างข้อมูลทั้งหมด</button>
                        <button class="btn-outline" onclick="isAdminMode=false; renderApp()">🚪 ออก</button>
                    </div>
                </div>
                <div class="flex-between" style="margin-top: 16px;">
                    <button class="btn-success" onclick="addAgent()">➕ เพิ่มตัวแทน</button>
                    <button class="btn-success" onclick="addKeyToAgent()">➕ เพิ่มคีย์</button>
                    <button class="btn-outline" onclick="loadSampleData()">📋 โหลดตัวอย่าง</button>
                </div>
            </div>
            <div class="card">
                <h2>👥 รายชื่อตัวแทนทั้งหมด</h2>
                ${agents.length === 0 ? '<p>ยังไม่มีตัวแทน</p>' : agents.map(ag => {
                    const agentKeys = keys.filter(k => k.agentId === ag.id);
                    return `
                        <div class="agent-item">
                            <div class="flex-between">
                                <strong>${escapeHtml(ag.id)}</strong>
                                <button class="btn-danger" onclick="deleteAgent('${ag.id}')">ลบตัวแทน</button>
                            </div>
                            <div style="margin-top: 8px;">
                                <code>${BASE_URL}?agent=${ag.code}</code>
                                <button class="btn-outline" style="margin-left: 8px;" onclick="navigator.clipboard.writeText('${BASE_URL}?agent=${ag.code}'); showToast('คัดลอกลิงก์แล้ว')">📋 คัดลอก</button>
                            </div>
                            ${agentKeys.length ? `<div style="margin-top: 12px;"><strong>คีย์ (${agentKeys.length}):</strong><br>` + 
                                agentKeys.map(k => `<div class="flex-between" style="margin-top: 8px;"><code>${k.key}</code><button class="btn-danger" style="padding: 4px 12px;" onclick="deleteKeyFromAgent('${k.key}', '${ag.id}')">ลบ</button></div>`).join('') + `</div>` : '<p style="margin-top: 8px;">ยังไม่มีคีย์</p>'}
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function renderApp() {
        const app = document.getElementById('app');
        const params = new URLSearchParams(window.location.search);
        
        if (params.get('admin') === ADMIN_SECRET) {
            isAdminMode = true;
            window.history.replaceState({}, '', window.location.pathname);
        }
        
        if (isAdminMode) {
            app.innerHTML = renderAdminView();
            return;
        }
        
        const agentCode = params.get('agent');
        if (agentCode) {
            const agent = agents.find(a => a.code === agentCode);
            if (agent) {
                app.innerHTML = renderAgentView(agent);
                const goBtn = document.getElementById('goAdminBtn');
                if (goBtn) goBtn.onclick = (e) => {
                    e.preventDefault();
                    let pwd = prompt("รหัส Admin:");
                    if (pwd === ADMIN_SECRET) {
                        isAdminMode = true;
                        renderApp();
                    } else showToast("รหัสผิด", true);
                };
                return;
            }
        }
        
        app.innerHTML = `
            <div class="card">
                <h1>🔗 ระบบลิงก์สำหรับตัวแทน</h1>
                <div class="alert" style="background:#fff3cd;">⚠️ ไม่พบข้อมูล</div>
                <p>👑 Admin: <a href="#" id="adminLink">คลิกเข้าสู่ระบบ</a></p>
            </div>
        `;
        document.getElementById('adminLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            let pwd = prompt("รหัส Admin:");
            if (pwd === ADMIN_SECRET) {
                isAdminMode = true;
                renderApp();
            } else showToast("รหัสผิด", true);
        });
    }
    
    // ให้ฟังก์ชันทำงานใน global scope สำหรับ onclick
    window.showToast = showToast;
    window.deleteKeyFromAgent = deleteKeyFromAgent;
    window.deleteAgent = deleteAgent;
    window.clearAllData = clearAllData;
    window.addAgent = addAgent;
    window.addKeyToAgent = addKeyToAgent;
    window.loadSampleData = loadSampleData;
    
    loadData();
    renderApp();
</script>
</body>
</html>
