<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Proxy Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03060c);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(0, 150, 255, 0.12), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 2;
            max-width: 580px;
            width: 100%;
            background: rgba(18, 25, 45, 0.55);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 56px;
            padding: 40px 32px;
            border: 1px solid rgba(100, 180, 255, 0.25);
            box-shadow: 0 32px 70px -20px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(100, 200, 255, 0.1) inset;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            animation: fadeUp 0.6s ease-out, floatCard 5s infinite alternate ease-in-out;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-8px); }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge-new {
            display: inline-block;
            background: rgba(80, 160, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 590;
            color: #a0d0ff;
            margin-bottom: 20px;
            border: 0.5px solid rgba(80, 160, 255, 0.4);
        }

        h1 {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b8dcff, #6eb0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .subtext {
            color: #8ba0c0;
            font-size: 15px;
            margin-bottom: 32px;
        }

        .video-card {
            border-radius: 38px;
            overflow: hidden;
            margin-bottom: 28px;
            box-shadow: 0 20px 35px -12px black;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .video-card iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .btn-primary {
            background: linear-gradient(95deg, #0c1f38, #071528);
            border: 1px solid #3c7bcb;
            padding: 18px;
            border-radius: 80px;
            font-size: 17px;
            font-weight: 600;
            color: #d2edff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary .icon-img {
            width: 24px;
            height: 24px;
            display: inline-block;
            background-image: url('https://i.postimg.cc/dhhyDTfG/IMG-0840.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            vertical-align: middle;
        }

        .btn-facebook {
            background: rgba(24, 119, 242, 0.15);
            border: 1px solid #1877f2;
            padding: 15px;
            border-radius: 80px;
            font-size: 16px;
            font-weight: 550;
            color: #9ac4ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-facebook:active {
            transform: scale(0.97);
        }

        .facebook-icon {
            width: 24px;
            height: 24px;
            display: inline-block;
            background-image: url('https://i.postimg.cc/SJjBXTN0/facebook-icon.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 2px #1877f2);
        }
        
        /* ปุ่ม Discord ที่เพิ่มใหม่ */
        .btn-discord {
            background: rgba(88, 101, 242, 0.15);
            border: 1px solid #5865f2;
            padding: 15px;
            border-radius: 80px;
            font-size: 16px;
            font-weight: 550;
            color: #b8c0ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }

        .btn-discord:active {
            transform: scale(0.97);
        }

        .discord-icon {
            width: 24px;
            height: 24px;
            display: inline-block;
            background-image: url('https://cdn-icons-png.flaticon.com/512/5968/5968756.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .footer-note {
            text-align: center;
            font-size: 10px;
            color: #5a6e88;
            margin-top: 28px;
        }

        .change-method-btn {
            background: transparent;
            border: 1px solid #8ba0c0;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 12px;
            color: #8ba0c0;
            cursor: pointer;
            margin-top: 16px;
            transition: 0.2s;
            width: auto;
            display: inline-block;
        }

        .change-method-btn:active {
            transform: scale(0.96);
            background: rgba(139, 160, 192, 0.2);
        }

        .key-banner {
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(80, 160, 255, 0.5);
            border-radius: 28px;
            padding: 18px 22px;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }

        .key-banner-label {
            font-size: 12px;
            font-weight: 500;
            color: #8ba0c0;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .key-banner-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .key-banner-text {
            font-size: 18px;
            font-weight: 600;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #c0e0ff;
            word-break: break-all;
            flex: 1;
            letter-spacing: 0.3px;
        }

        .copy-btn-small {
            background: linear-gradient(95deg, #1a3355, #0f1e38);
            border: 1px solid #3c7bcb;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 600;
            color: #d2edff;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .copy-btn-small:active {
            transform: scale(0.95);
        }

        .copy-btn-small.copied {
            background: #1e4a3b;
            border-color: #2ecc71;
            color: #a0ffd0;
        }

        .admin-panel {
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 100, 100, 0.6);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 28px;
        }

        .admin-title {
            font-size: 14px;
            font-weight: 700;
            color: #ff8888;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-section {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,100,100,0.3);
        }

        .admin-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .admin-label {
            font-size: 13px;
            font-weight: 600;
            color: #ffaaaa;
            margin-bottom: 8px;
        }

        .admin-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .admin-input-group input {
            flex: 2;
            background: #0b0f1c;
            border: 1px solid #ff8888;
            border-radius: 2rem;
            padding: 10px 16px;
            font-size: 13px;
            font-family: monospace;
            color: white;
            outline: none;
        }

        .admin-input-group input:focus {
            border-color: #ff5555;
            box-shadow: 0 0 0 3px rgba(255, 100, 100, 0.2);
        }

        .admin-save-btn {
            background: linear-gradient(95deg, #7a1a1a, #4a0f0f);
            border: 1px solid #ff6666;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 13px;
            font-weight: 600;
            color: #ffcccc;
            cursor: pointer;
        }

        .admin-save-btn:active {
            transform: scale(0.96);
        }

        .admin-note {
            font-size: 11px;
            color: #ffaaaa;
            margin-top: 10px;
        }

        .choice-modal .modal-container {
            max-width: 380px;
        }

        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        .choice-btn {
            background: linear-gradient(95deg, #1a2a4a, #0f1a30);
            border: 1px solid #3c7bcb;
            padding: 14px 20px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: #d2edff;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .choice-btn:active {
            transform: scale(0.97);
        }

        .choice-btn.wifi {
            border-color: #22c55e;
            color: #bef264;
        }

        .choice-btn.proxy {
            border-color: #f97316;
            color: #fdba74;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(16px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-container {
            background: rgba(18, 25, 45, 0.95);
            backdrop-filter: blur(24px);
            border-radius: 48px;
            padding: 32px 28px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            border: 1px solid rgba(100, 180, 255, 0.4);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-container {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffd966;
            margin-bottom: 12px;
        }

        .modal-message {
            font-size: 16px;
            color: #c0d4f0;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .modal-btn {
            background: linear-gradient(95deg, #1a4a7a, #0f2e4a);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .modal-btn:active {
            transform: scale(0.96);
        }

        .toast-notify {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0f172ad9;
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            font-weight: 500;
            color: #d9f99d;
            border: 1px solid #4ade80;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 1001;
            white-space: nowrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="card" id="app"></div>

<div class="modal-overlay" id="warningModal">
    <div class="modal-container">
        <div class="modal-icon">🎥</div>
        <div class="modal-title">โปรดทราบ</div>
        <div class="modal-message">กรุณาดูคลิปใช้งานก่อนทักถาม</div>
        <button class="modal-btn" id="modalOkBtn">ตกลง</button>
    </div>
</div>

<div class="modal-overlay choice-modal" id="choiceModal">
    <div class="modal-container">
        <div class="modal-icon">📱</div>
        <div class="modal-title">เลือกวิธีการติดตั้ง</div>
        <div class="modal-message">กรุณาเลือกประเภทการเชื่อมต่อที่คุณใช้</div>
        <div class="choice-buttons">
            <button class="choice-btn wifi" id="wifiChoiceBtn">
                📡 ลงผ่าน WiFi / เน็ตบ้าน
            </button>
            <button class="choice-btn proxy" id="proxyChoiceBtn">
                🔌 ลงผ่าน Proxy pin (เน็ตมือถือ)
            </button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="safariModal">
    <div class="modal-container">
        <div class="modal-icon">🌐</div>
        <div class="modal-title">กรุณาเปิดใน Safari</div>
        <div class="modal-message">เว็บไซต์นี้รองรับการทำงานเต็มรูปแบบบน Safari เท่านั้น<br><br>กรุณาเปิดลิงก์นี้ด้วย Safari เพื่อดำเนินการต่อ</div>
        <button class="modal-btn" id="openSafariBtn">เปิดใน Safari</button>
    </div>
</div>

<div id="toastMsg" class="toast-notify">✅ เปลี่ยนวิธีการติดตั้งแล้ว</div>

<script>
    (function() {
        // ========== ตรวจสอบเบราว์เซอร์ (บังคับ Safari บน iOS) ==========
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }
        
        function isSafari() {
            return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        }
        
        // ถ้าเป็น iOS แต่ไม่ใช่ Safari → แสดง Modal บังคับให้เปิดใน Safari
        if (isIOS() && !isSafari()) {
            const safariModal = document.getElementById('safariModal');
            const openSafariBtn = document.getElementById('openSafariBtn');
            
            setTimeout(() => {
                safariModal.classList.add('active');
            }, 100);
            
            if (openSafariBtn) {
                openSafariBtn.addEventListener('click', () => {
                    const currentUrl = window.location.href;
                    window.location.href = currentUrl;
                    setTimeout(() => {
                        alert('กรุณากด "เปิด" เพื่อเปิดใน Safari');
                    }, 100);
                });
            }
            
            document.body.style.pointerEvents = 'none';
            return;
        }
        
        const ADMIN_SECRET = "admin123";
        
        // ⚡ เปลี่ยนคลิปเริ่มต้นตรงนี้ ⚡
        let wifiVideoId = localStorage.getItem('proxy_wifi_video_id') || "iI7z8gFYn04";   // WiFi ใหม่
        let proxyVideoId = localStorage.getItem('proxy_proxy_video_id') || "jmZigFmkuVU"; // Proxy ใหม่
        
        let selectedMethod = sessionStorage.getItem('proxy_selected_method');
        
        function getKeyFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("key");
        }
        
        function getAdminFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get("admin");
        }
        
        const userKey = getKeyFromURL();
        const adminToken = getAdminFromURL();
        const isAdmin = (adminToken === ADMIN_SECRET);
        
        function extractVideoId(url) {
            if (!url) return null;
            const youtuBeMatch = url.match(/youtu\.be\/([a-zA-Z0-9_-]+)/);
            if (youtuBeMatch) return youtuBeMatch[1];
            const watchMatch = url.match(/[?&]v=([a-zA-Z0-9_-]+)/);
            if (watchMatch) return watchMatch[1];
            const embedMatch = url.match(/embed\/([a-zA-Z0-9_-]+)/);
            if (embedMatch) return embedMatch[1];
            const directMatch = url.match(/^([a-zA-Z0-9_-]{11})$/);
            if (directMatch) return directMatch[1];
            return null;
        }
        
        function updateVideoByMethod() {
            const iframe = document.getElementById('youtubeIframe');
            if (!iframe) return;
            let videoId = wifiVideoId;
            if (selectedMethod === 'wifi') videoId = wifiVideoId;
            else if (selectedMethod === 'proxy') videoId = proxyVideoId;
            iframe.src = `https://www.youtube.com/embed/${videoId}?rel=0&t=${Date.now()}`;
        }
        
        function setSelectedMethod(method) {
            selectedMethod = method;
            sessionStorage.setItem('proxy_selected_method', method);
            updateVideoByMethod();
            showToast(`✅ เปลี่ยนเป็น ${method === 'wifi' ? 'WiFi / เน็ตบ้าน' : 'Proxy pin (เน็ตมือถือ)'} แล้ว`);
        }
        
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toastMsg');
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0px)';
            if (isError) toast.style.borderColor = '#f87171';
            else toast.style.borderColor = '#4ade80';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(20px)';
            }, 2500);
        }
        
        const appContainer = document.getElementById('app');
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        
        function copyToClipboard(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = buttonElement.innerHTML;
                buttonElement.innerHTML = '✓ คัดลอกแล้ว!';
                buttonElement.classList.add('copied');
                setTimeout(() => {
                    buttonElement.innerHTML = originalText;
                    buttonElement.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                alert('กดคัดลอกไม่สำเร็จ กรุณาลองใหม่');
            });
        }
        
        let mainHTML = `
            <div style="text-align: center;">
                <span class="badge-new">✦ PROXY ACCESS ✦</span>
            </div>
            <h1>Proxy Setup</h1>
            <div class="subtext">ติดตั้งและยืนยันสิทธิ์การใช้งาน</div>
        `;
        
        if (isAdmin) {
            mainHTML += `
                <div class="admin-panel">
                    <div class="admin-title">
                        🔐 แผงควบคุมแอดมิน (เปลี่ยนคลิปวิดีโอสอน)
                    </div>
                    <div class="admin-section">
                        <div class="admin-label">📡 คลิปสำหรับ WiFi / เน็ตบ้าน</div>
                        <div class="admin-input-group">
                            <input type="text" id="adminWifiUrl" placeholder="วางลิงก์ YouTube คลิป WiFi" value="">
                            <button class="admin-save-btn" id="adminSaveWifiBtn">💾 เปลี่ยนคลิป WiFi</button>
                        </div>
                    </div>
                    <div class="admin-section">
                        <div class="admin-label">🔌 คลิปสำหรับ Proxy pin (เน็ตมือถือ)</div>
                        <div class="admin-input-group">
                            <input type="text" id="adminProxyUrl" placeholder="วางลิงก์ YouTube คลิป Proxy" value="">
                            <button class="admin-save-btn" id="adminSaveProxyBtn">💾 เปลี่ยนคลิป Proxy</button>
                        </div>
                    </div>
                    <div class="admin-note">
                        ⚡ เมื่อเปลี่ยนคลิป ระบบจะอัปเดตให้ผู้ใช้เห็นทันที (iOS ได้)
                    </div>
                </div>
            `;
        }
        
        if (userKey) {
            mainHTML += `
                <div class="key-banner">
                    <div class="key-banner-label">🔑 คีย์สำหรับใช้งาน (กดคัดลอก)</div>
                    <div class="key-banner-content">
                        <span class="key-banner-text" id="licenseKeyText">${escapeHtml(userKey)}</span>
                        <button class="copy-btn-small" id="copyKeyBtn">📋 คัดลอก</button>
                    </div>
                </div>
            `;
        }
        
        const initialVideoId = (selectedMethod === 'proxy') ? proxyVideoId : wifiVideoId;
        mainHTML += `
            <div class="video-card">
                <iframe id="youtubeIframe" 
                    src="https://www.youtube.com/embed/${initialVideoId}?rel=0&t=${Date.now()}" 
                    title="Proxy Tutorial"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen>
                </iframe>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="webPortalBtn">
                    <span class="icon-img"></span>
                    เว็บใส่คีย์ (ลงทะเบียน)
                </button>
                
                <button class="btn-facebook" id="facebookContactBtn">
                    <span class="facebook-icon"></span>
                    <span>ติดต่อผู้ดูแล (Facebook)</span>
                </button>
                
                <!-- ปุ่ม Discord ที่เพิ่มใหม่ -->
                <button class="btn-discord" id="discordBtn">
                    <span class="discord-icon"></span>
                    <span>💬 ดิสคอส มานั่งแช่ไว้เพื่อได้คีย์ฟรี</span>
                </button>
            </div>

            <div style="text-align: center;">
                <button class="change-method-btn" id="changeMethodBtn">
                    🔄 เปลี่ยนวิธีการเชื่อมต่อ
                </button>
            </div>

            <div class="footer-note">
                เข้ารหัส • การเข้าถึงส่วนตัว
            </div>
        `;
        
        appContainer.innerHTML = mainHTML;
        
        if (userKey) {
            const copyBtn = document.getElementById('copyKeyBtn');
            if (copyBtn) {
                copyBtn.addEventListener('click', () => {
                    copyToClipboard(userKey, copyBtn);
                });
            }
        }
        
        const changeMethodBtn = document.getElementById('changeMethodBtn');
        if (changeMethodBtn) {
            changeMethodBtn.addEventListener('click', () => {
                const modal = document.getElementById('choiceModal');
                modal.classList.add('active');
            });
        }
        
        if (isAdmin) {
            const saveWifiBtn = document.getElementById('adminSaveWifiBtn');
            const wifiUrlInput = document.getElementById('adminWifiUrl');
            if (saveWifiBtn) {
                saveWifiBtn.addEventListener('click', () => {
                    const url = wifiUrlInput.value.trim();
                    if (!url) { showToast('⚠️ กรุณาใส่ลิงก์ YouTube', true); return; }
                    const videoId = extractVideoId(url);
                    if (videoId) {
                        wifiVideoId = videoId;
                        localStorage.setItem('proxy_wifi_video_id', wifiVideoId);
                        showToast('✅ เปลี่ยนคลิป WiFi สำเร็จ! ผู้ใช้จะเห็นคลิปใหม่ทันที');
                        wifiUrlInput.value = '';
                        if (selectedMethod === 'wifi') updateVideoByMethod();
                    } else {
                        showToast('❌ ไม่สามารถดึงรหัสวิดีโอได้', true);
                    }
                });
            }
            
            const saveProxyBtn = document.getElementById('adminSaveProxyBtn');
            const proxyUrlInput = document.getElementById('adminProxyUrl');
            if (saveProxyBtn) {
                saveProxyBtn.addEventListener('click', () => {
                    const url = proxyUrlInput.value.trim();
                    if (!url) { showToast('⚠️ กรุณาใส่ลิงก์ YouTube', true); return; }
                    const videoId = extractVideoId(url);
                    if (videoId) {
                        proxyVideoId = videoId;
                        localStorage.setItem('proxy_proxy_video_id', proxyVideoId);
                        showToast('✅ เปลี่ยนคลิป Proxy สำเร็จ! ผู้ใช้จะเห็นคลิปใหม่ทันที');
                        proxyUrlInput.value = '';
                        if (selectedMethod === 'proxy') updateVideoByMethod();
                    } else {
                        showToast('❌ ไม่สามารถดึงรหัสวิดีโอได้', true);
                    }
                });
            }
        }
        
        const verifyBtn = document.getElementById('webPortalBtn');
        if (verifyBtn) {
            verifyBtn.addEventListener('click', () => {
                const url = userKey 
                    ? `https://proxy.scriptxmodz.xyz/index.php?key=${encodeURIComponent(userKey)}`
                    : 'https://proxy.scriptxmodz.xyz/index.php';
                window.open(url, '_blank');
            });
        }
        
        const fbBtn = document.getElementById('facebookContactBtn');
        if (fbBtn) {
            fbBtn.addEventListener('click', () => {
                window.open('https://www.facebook.com/share/14bYEXFv1Jd/?mibextid=wwXIfr', '_blank');
            });
        }
        
        // --- Event สำหรับปุ่ม Discord (ลิงก์ที่คุณให้มา) ---
        const discordBtn = document.getElementById('discordBtn');
        if (discordBtn) {
            discordBtn.addEventListener('click', () => {
                window.open('https://discord.gg/xwAqgW5xK', '_blank');
            });
        }
        // ------------------------------------------------
        
        const warningModal = document.getElementById('warningModal');
        const choiceModal = document.getElementById('choiceModal');
        const okBtn = document.getElementById('modalOkBtn');
        const wifiChoiceBtn = document.getElementById('wifiChoiceBtn');
        const proxyChoiceBtn = document.getElementById('proxyChoiceBtn');
        
        function showChoiceModal() {
            setTimeout(() => {
                choiceModal.classList.add('active');
            }, 100);
        }
        
        if (okBtn) {
            okBtn.addEventListener('click', () => {
                warningModal.classList.remove('active');
                if (!selectedMethod) {
                    showChoiceModal();
                }
            });
        }
        
        if (wifiChoiceBtn) {
            wifiChoiceBtn.addEventListener('click', () => {
                setSelectedMethod('wifi');
                choiceModal.classList.remove('active');
            });
        }
        
        if (proxyChoiceBtn) {
            proxyChoiceBtn.addEventListener('click', () => {
                setSelectedMethod('proxy');
                choiceModal.classList.remove('active');
            });
        }
        
        warningModal.addEventListener('click', (e) => {
            if (e.target === warningModal) warningModal.classList.remove('active');
        });
        choiceModal.addEventListener('click', (e) => {
            if (e.target === choiceModal) choiceModal.classList.remove('active');
        });
        
        setTimeout(() => {
            warningModal.classList.add('active');
        }, 100);
        
        if (selectedMethod) {
            updateVideoByMethod();
        }
    })();
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
